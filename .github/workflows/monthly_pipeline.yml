name: Monthly SBMA Pipeline

on:
  schedule:
    # First of each month at 08:00 UTC
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  monthly-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly monitor
        env:
          LLM_BACKEND: claude
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/run_monthly_monitor.py --days 30

      - name: Export to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/export_to_supabase.py

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbma-db-${{ github.run_number }}
          path: database/sbma_research.db
          retention-days: 90

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database/sbma_research.db
          git diff --cached --quiet || git commit -m "Monthly pipeline: $(date +%Y-%m-%d)"
          git push
